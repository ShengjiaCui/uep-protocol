# GAOKAO（dmayhem93/agieval-gaokao-chinese · split=test）→ UEP choices（中文高考语文）
# 源出 AGIEval 高考子集（GAOKAO-Bench 派生，MIT）。源字段全覆盖（3 字段）：
# query 含材料+题干（自含）→ task.question；choices 为 "(A)…" 文本列表→ options_from_texts
# （id 生成为位置字母 A–D，选项文本保留 "(A)" 前缀不改）；gold 为下标列表（多选形态，本子集
# 多为单元素）→ choice_match_from_index(from_list=true)（多选下标→多个 answer_ids）。
format: "hf:dmayhem93/agieval-gaokao-chinese"
version: "1.0.0"
changelog:
  - "1.0.0 (2026-07-07): 初版（A2 纵深，中文高考）。gold 为下标列表→choice_match_from_index
    新增 from_list=true 支持多选下标（向后兼容单标量集）；choices 文本含 (A) 前缀，位置字母作 id"
table:
  task.question: query
transforms:
  - op: const
    target: task.type
    value: choices
  - op: const
    target: lang
    value: ["zh-CN"]
  - op: format_id
    template: "gaokao-chinese-test-{row_idx:04d}"
  - op: options_from_texts
    source: choices
    id_style: letters
  - op: choice_match_from_index
    source: gold
    id_style: letters
    from_list: true
