# SciFact（BeIR/scifact · 检索三表经 fetch 连接为自含行）→ UEP retrieval
# 切片行 = {_id, title, text, qrels:[{corpus-id:int, score:int}]}（连接配方在 slices.lock.json）
# 语料引用式（大语料防 OOM，SPEC §3.5）：corpus.uri 指向上游 corpus 表
format: "hf:BeIR/scifact"
version: "1.0.0"
changelog:
  - "1.0.0 (2026-07-05): 初版。qrels 源 id 为 int，id_dtype=int 保反演；
    相关性判分指标默认 ndcg@10 随 Verifier 自含"
table:
  id: _id
  task.query: text
  metadata.title: title
transforms:
  - op: const
    target: task.type
    value: retrieval
  - op: const
    target: lang
    value: ["en"]
  - op: const
    target: task.corpus
    value: {uri: "hf:BeIR/scifact:corpus"}
  - op: relevance_from_qrels
    source: qrels
    id_dtype: int
